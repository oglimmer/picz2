# Default values for photo-upload
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

# Backend (API) configuration
backend:
  name: api
  image:
    repository: registry.oglimmer.com/picz2-be
    pullPolicy: Always
    tag: "latest"

  # Base URL for Open Graph meta tags
  baseUrl: "https://picz2.oglimmer.com"

  service:
    type: ClusterIP
    port: 8080

  resources:
    # R2 slim: api pod no longer runs ImageMagick / ffmpeg / vips. Heavy work moved to the worker
    # pod (Phase 4e). Steady-state api footprint is just heap + Tomcat NIO + S3 SDK direct buffers.
    # 1Gi limit is comfortable; requests sized at 768Mi so the scheduler reserves the working set.
    limits:
      cpu: 4000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 768Mi

  # R2 slim: heap halved to 512m since api no longer holds derivative bytes in flight. Direct-memory
  # cap at 256Mi prevents Tomcat NIO's DirectByteBuffer pool from quietly growing to Xmx.
  # ExitOnOutOfMemoryError turns any heap OOM into a fast pod restart instead of a staggering
  # zombie. NativeMemoryTracking=summary keeps jcmd VM.native_memory available for diagnosis.
  javaOpts: "-Xmx512m -Xms256m -XX:MaxMetaspaceSize=192m -XX:MaxDirectMemorySize=256m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+ExitOnOutOfMemoryError -XX:NativeMemoryTracking=summary"

  # Max concurrent image/video processing operations (HEIC conversion, thumbnails, transcoding)
  maxConcurrentProcessing: 1
  # Backlog of queued uploads waiting for a processing worker. When full, new uploads
  # receive HTTP 503 with Retry-After so clients back off instead of stalling the pod.
  processingQueueCapacity: 50

  # Phase 4 deployment-split knob. The api pod runs api profile only; the worker pod
  # (replicas: 1 below) drains processing_jobs. JobDispatcher is @Profile(WORKER) and simply
  # isn't loaded on the api pod.
  sprintProfilesActive: "api"

  # Persistent volume for uploads.
  #
  # `enabled` controls whether the PVC resource is rendered at all. After the S3 migration we
  # keep the PVC defined (so it stays in-cluster as a backup of historical bytes) but stop
  # mounting it into the pod via `mounted=false`. With mounted=false the deployment swaps in an
  # emptyDir at `mountPath`, which is sufficient for Spring's transient .multipart-tmp,
  # .processing-tmp/{id} workdirs, and .audio-tmp staging — all of which are wiped per
  # request/job.
  persistence:
    enabled: true
    mounted: false
    storageClass: ""
    accessMode: ReadWriteOnce
    # The live PVC was expanded in-cluster to 30Gi; K8s rejects shrinking a PVC, so this value
    # must match (or exceed) the actual provisioned capacity.
    size: 30Gi
    mountPath: /app/uploads
    # Cap on the in-pod scratch volume when persistence.mounted=false. Comfortably above the
    # peak transient footprint (largest in-flight upload + per-job derivative workdir + audio
    # reencode temp). Bump if processing larger files becomes routine.
    emptyDirSizeLimit: 5Gi

# Worker (processing-side) configuration. Drains processing_jobs and runs the heavy
# image/video pipeline. Same image as backend, different SPRING_PROFILES_ACTIVE.
# In R1 we render the manifest with `replicas: 0` to validate scheduling without
# behavioural change; R2 bumps to 1 and flips the api pod's profile to api-only.
worker:
  enabled: true
  name: worker
  image:
    # Same image as backend; tag falls through to backend.image.tag if left blank.
    repository: registry.oglimmer.com/picz2-be
    pullPolicy: Always
    tag: ""
  # R2: 1 worker pod drains processing_jobs. Each pod has Semaphore(1), so scale-out gives
  # parallelism but isn't required day-1 on the single-node Pi cluster (per D22).
  replicas: 1
  # Heavy pipeline budget: ImageMagick / HEIC + ffmpeg can each push native memory toward
  # 1.5 GiB. JVM heap is capped low (-Xmx512m) since most of the work happens in subprocesses.
  resources:
    limits:
      cpu: 4000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi
  # Worker-side JVM is small — actual encode RAM lives in vipsthumbnail / ffmpeg subprocesses.
  # MaxRAMPercentage=35 caps heap on the small-pod side without us tuning per-pod -Xmx by hand.
  javaOpts: "-Xmx512m -XX:MaxRAMPercentage=35.0 -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError -XX:NativeMemoryTracking=summary"
  # No PVC. Worker reads originals from S3 into emptyDir, produces derivatives locally, PUTs
  # them back, then wipes the workdir. Sized comfortably above peak per-job footprint.
  workdir:
    sizeLimit: 5Gi
    mountPath: /app/uploads
  # Worker always uses the worker profile (loads JobDispatcher / FileProcessingService /
  # ThumbnailService) and drains the processing_jobs queue.
  sprintProfilesActive: "worker"

# Frontend configuration
frontend:
  name: web
  image:
    repository: registry.oglimmer.com/picz2-fe
    pullPolicy: Always
    tag: "latest"

  service:
    type: ClusterIP
    port: 80

  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

# Object storage (MinIO / S3-compatible). When enabled, uploads, derivatives, and reads go
# through this bucket. The bucket lives in-cluster; only the credentials should be overridden
# per-environment via --set or an external secrets manager.
objectStorage:
  enabled: true
  # In-cluster MinIO Service URL.
  endpoint: "http://minio.minio.svc.cluster.local:9000"
  bucket: "photo-upload"
  region: "us-east-1"
  # Defaults are placeholders and MUST be overridden in production. Prefer --set or sealed-secrets
  # over committing real values to this file.
  accessKey: ""
  secretKey: ""

# Database configuration (external MariaDB)
database:
  # External database configuration
  external:
    enabled: true
    host: mariadb
    port: 3306
    name: photoupload
    user: photoupload
    # Password should be set via --set or in a separate secret
    password: "photoupload"

# Ingress configuration with Traefik support
ingress:
  enabled: true
  annotations:
    cert-manager.io/cluster-issuer: "oglimmer-com-dns"
  hosts:
    - host: picz2.oglimmer.com
      paths:
        - path: /api
          pathType: Prefix
          backend: api
        # Swagger/OpenAPI endpoints
        - path: /swagger-ui
          pathType: Prefix
          backend: api
        - path: /swagger-ui.html
          pathType: Prefix
          backend: api
        - path: /v3/api-docs
          pathType: Prefix
          backend: api
        # Public album pages for Open Graph (must come before frontend catch-all)
        - path: /public/album
          pathType: Prefix
          backend: api
        # Frontend must be last as it's the catch-all
        - path: /
          pathType: Prefix
          backend: web
  tls:
    - secretName: tls-picz2-ingress-dns
      hosts:
        - picz2.oglimmer.com

# Service Account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod annotations
podAnnotations: {}

# Pod security context
podSecurityContext:
  fsGroup: 10001

# Security context
securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Image pull secrets
imagePullSecrets:
  - name: oglimmerregistrykey

# Prometheus scrape configuration. Targets the standalone `prometheus` Helm chart's
# `kubernetes-service-endpoints` SD job, which picks up Services annotated with
# `prometheus.io/scrape="true"`. No prometheus-operator / CRDs required.
#
# Alert rules are NOT managed by this chart in the standalone-Prometheus setup — they
# live in the prometheus chart's `serverFiles.alerting_rules.yml`. See NOTES.txt for
# the rule YAML to paste in once.
monitoring:
  scrape:
    enabled: true
    # Backend management port (Spring Boot actuator). Must match `management.server.port`
    # in application.yml and the `management` containerPort on the backend Deployment.
    port: 8081
    path: /actuator/prometheus
    # Extra annotations to merge onto the metrics Service (e.g. prometheus.io/scheme).
    additionalAnnotations: {}
