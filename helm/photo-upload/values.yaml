# Default values for photo-upload
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

# Backend (API) configuration
backend:
  name: api
  image:
    repository: registry.oglimmer.com/picz2-be
    pullPolicy: Always
    tag: "latest"

  # Base URL for Open Graph meta tags
  baseUrl: "https://picz2.oglimmer.com"

  service:
    type: ClusterIP
    port: 8080

  resources:
    # Honest budget after streaming uploads + bounded native memory: steady state ~1.2 GiB, peak
    # with one ImageMagick subprocess ~2.2 GiB. 3Gi limit gives headroom; requests raised so the
    # scheduler actually reserves the working set instead of relying on burst oversubscription.
    limits:
      cpu: 4000m
      memory: 3Gi
    requests:
      cpu: 500m
      memory: 1536Mi

  # Heap caps at 1Gi; direct-memory cap at 256Mi prevents Tomcat NIO's DirectByteBuffer pool from
  # quietly growing to Xmx. ExitOnOutOfMemoryError turns any heap OOM into a fast pod restart
  # instead of a staggering zombie. NativeMemoryTracking=summary keeps jcmd VM.native_memory
  # available for diagnosis without meaningful runtime cost.
  javaOpts: "-Xmx1024m -Xms512m -XX:MaxMetaspaceSize=192m -XX:MaxDirectMemorySize=256m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+ExitOnOutOfMemoryError -XX:NativeMemoryTracking=summary"

  # Max concurrent image/video processing operations (HEIC conversion, thumbnails, transcoding)
  maxConcurrentProcessing: 1
  # Backlog of queued uploads waiting for a processing worker. When full, new uploads
  # receive HTTP 503 with Retry-After so clients back off instead of stalling the pod.
  processingQueueCapacity: 50

  # Persistent volume for uploads
  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    # The live PVC was expanded in-cluster to 30Gi; K8s rejects shrinking a PVC, so this value
    # must match (or exceed) the actual provisioned capacity.
    size: 30Gi
    mountPath: /app/uploads

# Frontend configuration
frontend:
  name: web
  image:
    repository: registry.oglimmer.com/picz2-fe
    pullPolicy: Always
    tag: "latest"

  service:
    type: ClusterIP
    port: 80

  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

# Database configuration (external MariaDB)
database:
  # External database configuration
  external:
    enabled: true
    host: mariadb
    port: 3306
    name: photoupload
    user: photoupload
    # Password should be set via --set or in a separate secret
    password: "photoupload"

# Ingress configuration with Traefik support
ingress:
  enabled: true
  annotations:
    cert-manager.io/cluster-issuer: "oglimmer-com-dns"
  hosts:
    - host: picz2.oglimmer.com
      paths:
        - path: /api
          pathType: Prefix
          backend: api
        # Swagger/OpenAPI endpoints
        - path: /swagger-ui
          pathType: Prefix
          backend: api
        - path: /swagger-ui.html
          pathType: Prefix
          backend: api
        - path: /v3/api-docs
          pathType: Prefix
          backend: api
        # Public album pages for Open Graph (must come before frontend catch-all)
        - path: /public/album
          pathType: Prefix
          backend: api
        # Frontend must be last as it's the catch-all
        - path: /
          pathType: Prefix
          backend: web
  tls:
    - secretName: tls-picz2-ingress-dns
      hosts:
        - picz2.oglimmer.com

# Service Account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod annotations
podAnnotations: {}

# Pod security context
podSecurityContext:
  fsGroup: 10001

# Security context
securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Image pull secrets
imagePullSecrets:
  - name: oglimmerregistrykey

# Prometheus monitoring rules. Requires the prometheus-operator CRDs (PrometheusRule)
# to be installed in the cluster — set storageAlert.enabled=false to skip if they aren't.
monitoring:
  storageAlert:
    enabled: true
    # Fraction (0–1) of capacity that triggers the alert. 0.8 = 80%.
    threshold: 0.8
    # Sustained-breach duration before the alert fires.
    for: 10m
    # Extra labels to merge onto the PrometheusRule (e.g. release: kube-prometheus-stack)
    # so the in-cluster Prometheus picks the rule up.
    additionalLabels: {}
