{{- if .Values.monitoring.jobsAlert.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "photo-upload.fullname" . }}-jobs
  labels:
    {{- include "photo-upload.labels" . | nindent 4 }}
    {{- with .Values.monitoring.jobsAlert.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: photo-upload-jobs
      rules:
        - alert: PhotoUploadJobsBacklog
          # Sustained QUEUED depth means the dispatcher is falling behind. Threshold mirrors
          # `jobs.backpressure.queue-depth-threshold` (default 200) — if QUEUED stays at the
          # rejection threshold for minutes, uploads are bouncing with 503 and we're losing work.
          expr: photoupload_jobs_queued{status="QUEUED"} > {{ .Values.monitoring.jobsAlert.queuedThreshold | default 200 }}
          for: {{ .Values.monitoring.jobsAlert.queuedFor | default "5m" }}
          labels:
            severity: warning
            app: {{ include "photo-upload.name" . }}
          annotations:
            summary: "Processing backlog above threshold"
            description: |
              QUEUED depth has exceeded {{ .Values.monitoring.jobsAlert.queuedThreshold | default 200 }} for
              {{ .Values.monitoring.jobsAlert.queuedFor | default "5m" }}. The dispatcher is not keeping up;
              uploads will start receiving HTTP 503.
        - alert: PhotoUploadJobsDeadLetter
          # Any DEAD_LETTER row is a permanent failure that kept the original blob but produced
          # no derivatives. This is potential data loss — page so an operator can decide
          # (delete, repair, re-enqueue) before the user notices.
          expr: photoupload_jobs_queued{status="DEAD_LETTER"} > 0
          for: 1m
          labels:
            severity: critical
            app: {{ include "photo-upload.name" . }}
          annotations:
            summary: "Processing job in DEAD_LETTER"
            description: |
              At least one processing job exhausted its retries and is now in DEAD_LETTER.
              Inspect via `GET /api/admin/dead-letter` and decide whether to delete the asset,
              fix the underlying issue, or re-enqueue.
{{- end }}
