{{- if .Values.monitoring.storageAlert.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "photo-upload.fullname" . }}-storage
  labels:
    {{- include "photo-upload.labels" . | nindent 4 }}
    {{- with .Values.monitoring.storageAlert.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: photo-upload-storage
      rules:
        - alert: PhotoUploadPVCNearlyFull
          # Fires when any PVC owned by this release passes the configured fill threshold.
          # Once we add MinIO (Phase 3) the same selector will catch its PVC too — this rule does
          # not encode a hard-coded PVC name on purpose.
          expr: |
            (
              kubelet_volume_stats_used_bytes{namespace="{{ .Release.Namespace }}",persistentvolumeclaim=~"{{ include "photo-upload.fullname" . }}-.*"}
              /
              kubelet_volume_stats_capacity_bytes{namespace="{{ .Release.Namespace }}",persistentvolumeclaim=~"{{ include "photo-upload.fullname" . }}-.*"}
            ) > {{ .Values.monitoring.storageAlert.threshold }}
          for: {{ .Values.monitoring.storageAlert.for }}
          labels:
            severity: warning
            app: {{ include "photo-upload.name" . }}
          annotations:
            summary: "PVC {{ "{{ $labels.persistentvolumeclaim }}" }} above {{ .Values.monitoring.storageAlert.threshold }} full"
            description: |
              {{ "{{ $labels.persistentvolumeclaim }}" }} in namespace {{ "{{ $labels.namespace }}" }} has been
              above {{ .Values.monitoring.storageAlert.threshold }} for {{ .Values.monitoring.storageAlert.for }}.
              Free space, expand the volume, or run the retention sweep.
{{- end }}
