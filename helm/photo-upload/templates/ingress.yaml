{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "photo-upload.fullname" . }}
  labels:
    {{- include "photo-upload.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          {{- /* Skip tusd-routed paths when TUS is disabled, otherwise the Ingress would */}}
          {{- /* point at a Service that hasn't been rendered. */}}
          {{- if or (ne .backend "tusd") $.Values.tus.enabled }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                {{- if eq .backend "api" }}
                name: {{ include "photo-upload.backend.fullname" $ }}
                port:
                  number: {{ $.Values.backend.service.port }}
                {{- else if eq .backend "web" }}
                name: {{ include "photo-upload.frontend.fullname" $ }}
                port:
                  number: {{ $.Values.frontend.service.port }}
                {{- else if eq .backend "tusd" }}
                name: {{ include "photo-upload.tusd.fullname" $ }}
                port:
                  number: {{ $.Values.tus.service.port | default 1080 }}
                {{- end }}
          {{- end }}
          {{- end }}
    {{- end }}
{{- end }}
