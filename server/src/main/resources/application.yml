---
server:
  port: 8080
  compression:
    enabled: true
    mime-types: "text/html, text/xml, text/plain, text/css, text/javascript, application/javascript,\
      \ application/json, application/xml\n"
    excluded-user-agents: ""
  tomcat:
    threads:
      max: 25
      min-spare: 4
    max-connections: 60
    accept-count: 20
    connection-timeout: 20000
spring:
  profiles:
    # Phase 4a default: load both api and worker beans in one JVM. Phase 4e/R2 overrides this via
    # SPRING_PROFILES_ACTIVE on the per-pod Deployment env (api on the upload pod, worker on the
    # processing pod). Env always wins over this property.
    active: "${SPRING_PROFILES_ACTIVE:api,worker}"
  servlet:
    multipart:
      enabled: true
      max-file-size: "500MB"
      max-request-size: "500MB"
      file-size-threshold: 0
      location: "${FILE_UPLOAD_BASE_PATH:./uploads/}/.multipart-tmp"
  datasource:
    url: "jdbc:mariadb://${MARIADB_HOST:localhost}:${MARIADB_PORT:3306}/${MARIADB_DATABASE:photoupload}"
    username: "${MARIADB_USER:photoupload}"
    password: "${MARIADB_PASSWORD:photoupload}"
    driver-class-name: "org.mariadb.jdbc.Driver"
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: "HikariPool-PhotoUpload"
      leak-detection-threshold: 60000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: "validate"
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: "org.hibernate.dialect.MariaDBDialect"
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: "classpath:db/migration"
    validate-on-migrate: true
  mail:
    host: "${MAIL_HOST:192.168.178.52}"
    port: "${MAIL_PORT:25}"
    username: "${MAIL_USERNAME:}"
    password: "${MAIL_PASSWORD:}"
    from: "${MAIL_FROM:noreply@junta-online.net}"
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
file:
  upload:
    upload-dir: "${FILE_UPLOAD_BASE_PATH:./uploads/}"
    max-file-size: 524288000
    max-files-per-request: 100
    max-concurrent-processing: "${FILE_UPLOAD_MAX_CONCURRENT_PROCESSING:2}"
    processing-queue-capacity: "${FILE_UPLOAD_PROCESSING_QUEUE_CAPACITY:50}"
    duplicate-detection-enabled: "${FILE_UPLOAD_DUPLICATE_DETECTION_ENABLED:true}"
    thumbnailer: "${FILE_UPLOAD_THUMBNAILER:vips}"
storage:
  s3:
    enabled: "${STORAGE_S3_ENABLED:false}"
    endpoint: "${STORAGE_S3_ENDPOINT:}"
    access-key: "${STORAGE_S3_ACCESS_KEY:}"
    secret-key: "${STORAGE_S3_SECRET_KEY:}"
    bucket: "${STORAGE_S3_BUCKET:photo-upload}"
    region: "${STORAGE_S3_REGION:us-east-1}"
    path-style-access: "${STORAGE_S3_PATH_STYLE_ACCESS:true}"
    auto-create-bucket: "${STORAGE_S3_AUTO_CREATE_BUCKET:true}"
    presign-seconds: "${STORAGE_S3_PRESIGN_SECONDS:3600}"
    api-call-attempt-timeout-seconds: "${STORAGE_S3_API_CALL_ATTEMPT_TIMEOUT_SECONDS:30}"
    api-call-timeout-seconds: "${STORAGE_S3_API_CALL_TIMEOUT_SECONDS:60}"
retention:
  # Phase 6 / Gap 4-finish — nightly CronJob purges originals from MinIO once derivatives are
  # durable and the row is older than this many days. Conservative default per the plan; the
  # alert-first phase used 7 days as the canonical threshold.
  original-days: "${RETENTION_ORIGINAL_DAYS:7}"
  max-rows-per-run: "${RETENTION_MAX_ROWS_PER_RUN:5000}"
  dry-run: "${RETENTION_DRY_RUN:false}"
jobs:
  poll:
    interval-ms: "${JOBS_POLL_INTERVAL_MS:2000}"
  lease:
    seconds: "${JOBS_LEASE_SECONDS:900}"
  max-attempts: "${JOBS_MAX_ATTEMPTS:3}"
  backpressure:
    queue-depth-threshold: "${JOBS_BACKPRESSURE_QUEUE_DEPTH_THRESHOLD:200}"
    refresh-ms: "${JOBS_BACKPRESSURE_REFRESH_MS:1000}"
logging:
  level:
    ROOT: "info"
    com.oglimmer.photoupload: "debug"
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
app:
  base-url: "${APP_BASE_URL:https://picz2.oglimmer.com}"
  mail:
    enabled: "${MAIL_ENABLED:true}"
  apns:
    enabled: "${APNS_ENABLED:true}"
    key-path: "${APNS_KEY_PATH:AuthKey_W4CMQFDV9D.p8}"
    key-id: "${APNS_KEY_ID:W4CMQFDV9D}"
    team-id: "${APNS_TEAM_ID:SBFZ9G94BG}"
    topic: "${APNS_TOPIC:com.oglimmer.photosync}"
    production: "${APNS_PRODUCTION:false}"
management:
  server:
    port: 8081
    address: "0.0.0.0"
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus"
  endpoint:
    health:
      show-details: "always"
      probes:
        enabled: true
  info:
    git:
      mode: "full"
springdoc:
  api-docs:
    path: "/v3/api-docs"
  swagger-ui:
    path: "/swagger-ui.html"
    enabled: true
    operations-sorter: "alpha"
    tags-sorter: "alpha"
    display-request-duration: true
    try-it-out-enabled: true
  show-actuator: false
